# Root pytest config so a single `pytest` at the repo root runs the whole gate.
#
# The repo is a monorepo of independent per-day suites; several days share test
# filenames (test_schema.py, conftest.py, ...). `importlib` import mode gives
# each test module a unique identity by its path, so duplicate basenames across
# days no longer collide on import. Auto-discovery picks up every `dayN/tests`
# that exists, so new days are covered without editing this file.
#
# `make test` still runs each day in isolation; this just makes the natural
# `pytest` invocation at the repo root work too.
[pytest]
addopts = --import-mode=importlib
norecursedirs = .venv .git *.egg-info __pycache__ .pytest_cache scripts evidence
