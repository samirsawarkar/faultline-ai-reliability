name: CI

# Every push and PR runs the full gate on three Python versions. Determinism
# claims are only credible if a machine re-proves them on every commit, so the
# determinism experiment and the over-budget attack run here too, not just the
# unit tests.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: gate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Day 1 — determinism + oracle tests (stdlib)
        run: cd day1 && python -m pytest tests/ -v

      - name: Day 1 — cross-process / cross-hashseed determinism proof
        run: cd day1 && python scripts/experiment_determinism.py

      - name: Day 1 — enforced oracle hand-check
        run: cd day1 && python scripts/handcheck.py

      - name: Day 2 — contracts + termination tests
        run: cd day2 && python -m pytest tests/ -v

      - name: Day 2 — forced over-budget termination attack
        run: cd day2 && python scripts/experiment_budget.py

      - name: Day 3 — baseline + Wilson + reproducibility tests
        run: cd day3 && python -m pytest tests/ -v

      - name: Day 3 — baseline reproduces byte-for-byte from committed config
        run: |
          python day3/scripts/build_baseline.py
          git diff --exit-code -- day3/evidence/baseline.json day3/evidence/success_vs_hops.svg

      - name: Day 3 — mislabeled-input attack
        run: cd day3 && python scripts/attack_mislabeled.py

      - name: Day 4 — span / tracer / redaction + forced-failure gate
        run: cd day4 && python -m pytest tests/ -v

      - name: Day 4 — traces reproduce byte-for-byte (100-run failure report)
        run: |
          python day4/scripts/make_traces.py
          git diff --exit-code -- day4/evidence/

      - name: Day 5 — store + viewer + reconstruction attack
        run: cd day5 && python -m pytest tests/ -v

      - name: Day 5 — viewer/SVG/attack evidence reproduces byte-for-byte
        run: |
          python day5/scripts/make_evidence.py
          # timing is wall-clock (excluded); trace.db is git-ignored
          git diff --exit-code -- day5/evidence/failed_run.svg \
            day5/evidence/timeline_failed.txt \
            day5/evidence/attack_report.json \
            day5/evidence/incident_narrative.md

      - name: Day 6 — replay bundle + boundary report
        run: cd day6 && python -m pytest tests/ -v

      - name: Day 6 — replay bundle + report reproduce byte-for-byte
        run: |
          python day6/scripts/make_evidence.py
          # environment.json is runtime-specific (excluded)
          git diff --exit-code -- day6/evidence/bundle_simulator.json \
            day6/evidence/replay_simulator.json \
            day6/evidence/replay_report.json

      - name: Day 7 — hop sweep + Q1 measurement + observability gate
        run: cd day7 && python -m pytest tests/ -v

      - name: Day 7 — Q1 results + figure reproduce byte-for-byte
        run: |
          python day7/scripts/run_q1.py
          git diff --exit-code -- day7/evidence/

      - name: Day 8 — fault spec + triggers + boundary + injection integrity
        run: cd day8 && python -m pytest tests/ -v

      - name: Day 8 — injector evidence reproduces byte-for-byte (identical triggers, no leakage)
        run: |
          python day8/scripts/make_evidence.py
          git diff --exit-code -- day8/evidence/
